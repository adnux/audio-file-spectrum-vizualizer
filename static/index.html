<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Spectrum Visualizer</title>
  <link rel="icon" type="image/png" href="/spectrum.png" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🎵 Audio Spectrum Visualizer</h1>
      <p class="subtitle">Select one or more audio files to analyze their frequency spectrum</p>
    </header>

    <section class="upload-zone" id="dropZone">
      <div class="upload-icon">📂</div>
      <p>Drag &amp; drop audio files here, or</p>
      <label class="btn-primary" for="fileInput">Browse Files</label>
      <input type="file" id="fileInput" accept="audio/*,.mp3,.wav,.flac,.ogg,.aac,.m4a,.opus" multiple hidden />
      <p class="hint">Supported: MP3, WAV, FLAC, OGG, AAC, M4A, OPUS and more</p>
    </section>

    <section id="fileList" class="file-list hidden">
      <h2>Selected files</h2>
      <ul id="fileItems"></ul>
      <div class="actions">
        <button id="analyzeBtn" class="btn-primary">Analyze</button>
        <button id="clearBtn" class="btn-secondary">Clear</button>
      </div>
    </section>

    <section id="progress" class="hidden">
      <div class="spinner"></div>
      <p id="progressMsg">Analyzing…</p>
    </section>

    <section id="results" class="hidden">
      <div class="results-header">
        <h2>Frequency Spectrum</h2>
        <div class="controls">
          <label>
            <input type="checkbox" id="logScale" checked />
            Logarithmic frequency axis
          </label>
          <label>
            <input type="checkbox" id="smoothing" checked />
            Smoothing
          </label>
          <label>
            Max freq (Hz):
            <input type="number" id="maxFreq" value="20000" min="100" max="96000" step="100" />
          </label>
        </div>
      </div>
      <div id="chart"></div>
    </section>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
